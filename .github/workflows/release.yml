name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      app_slug: ${{ steps.meta.outputs.app_slug }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi

      - name: Ensure tag is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag commit is not on main"
            exit 1
          fi

      - name: Load app metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(python3 - <<'PY'
          from app.metadata import APP_VERSION, APP_SLUG
          print(APP_VERSION)
          print(APP_SLUG)
          PY
          )
          APP_VERSION=$(echo "$VERSION" | sed -n '1p')
          APP_SLUG=$(echo "$VERSION" | sed -n '2p')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match APP_VERSION ($APP_VERSION)"
            exit 1
          fi
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_slug=$APP_SLUG" >> "$GITHUB_OUTPUT"
          echo "release_name=${APP_SLUG}-${APP_VERSION}" >> "$GITHUB_OUTPUT"

  build-macos:
    runs-on: macos-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build DMG
        run: python scripts/release.py macos-dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*-macos.dmg
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build installer
        run: python scripts/release.py windows-installer

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows-setup.exe
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: [validate, build-macos, build-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files and checksums
        shell: bash
        run: |
          mkdir -p final
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" \) -print0 | while IFS= read -r -d '' f; do
            cp "$f" final/
          done
          (cd final && shasum -a 256 *.dmg *.exe > SHA256SUMS.txt)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.validate.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            final/*.dmg
            final/*.exe
            final/SHA256SUMS.txt
