name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target semver version (X.Y.Z)"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Validate requested version
        shell: bash
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update APP_VERSION
        shell: bash
        run: |
          sed -i "s/^APP_VERSION = \".*\"/APP_VERSION = \"${{ inputs.version }}\"/" app/metadata.py

      - name: Create version bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: version-bump/${{ inputs.version }}
          base: main
          title: "chore: bump version to ${{ inputs.version }}"
          commit-message: "chore: bump version to ${{ inputs.version }}"
          body: |
            Automated version bump PR.

            - Updates `APP_VERSION` in `app/metadata.py`
            - Target version: `${{ inputs.version }}`
