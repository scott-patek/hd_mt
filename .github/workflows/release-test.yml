name: Release Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to build"
        required: true
        default: "main"
      label:
        description: "Optional label (e.g. alpha, beta)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-test-${{ inputs.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      app_slug: ${{ steps.meta.outputs.app_slug }}
      app_version: ${{ steps.meta.outputs.app_version }}
      safe_ref: ${{ steps.meta.outputs.safe_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Collect metadata
        id: meta
        shell: bash
        run: |
          META=$(python - <<'PY'
          from app.metadata import APP_SLUG, APP_VERSION
          print(APP_SLUG)
          print(APP_VERSION)
          PY
          )
          APP_SLUG=$(echo "$META" | sed -n '1p')
          APP_VERSION=$(echo "$META" | sed -n '2p')
          RAW_REF="${{ inputs.ref }}"
          SAFE_REF=$(echo "$RAW_REF" | tr '/._ ' '-' | tr -cd '[:alnum:]-' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ -n "${{ inputs.label }}" ]]; then
            SAFE_LABEL=$(echo "${{ inputs.label }}" | tr '/._ ' '-' | tr -cd '[:alnum:]-' | tr '[:upper:]' '[:lower:]')
            RELEASE_TAG="test-${SAFE_REF}-${SAFE_LABEL}-build.${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="${APP_SLUG}-test-${SAFE_REF}-${SAFE_LABEL}-build.${GITHUB_RUN_NUMBER}"
          else
            RELEASE_TAG="test-${SAFE_REF}-build.${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_NAME="${APP_SLUG}-test-${SAFE_REF}-build.${GITHUB_RUN_NUMBER}"
          fi
          echo "app_slug=$APP_SLUG" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_ref=$SAFE_REF" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

  build-macos:
    runs-on: macos-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build DMG
        run: python scripts/release.py macos-dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*-macos.dmg
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build installer
        run: python scripts/release.py windows-installer

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows-setup.exe
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: [metadata, build-macos, build-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files and checksums
        shell: bash
        run: |
          mkdir -p final
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.exe" \) -print0 | while IFS= read -r -d '' f; do
            cp "$f" final/
          done
          (cd final && shasum -a 256 *.dmg *.exe > SHA256SUMS.txt)

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.metadata.outputs.release_name }}
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          prerelease: true
          target_commitish: ${{ inputs.ref }}
          files: |
            final/*.dmg
            final/*.exe
            final/SHA256SUMS.txt
